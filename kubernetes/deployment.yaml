apiVersion: apps/v1
kind: Deployment
metadata:
  name: hape-dora-demo-service-c
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hape-dora-demo-service-c
  template:
    metadata:
      labels:
        app: hape-dora-demo-service-c
    spec:
      containers:
      - name: hape-dora-demo-service-c
        image: nginx:1.27
        ports:
        - containerPort: 80
